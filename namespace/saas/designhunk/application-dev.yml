#brokers: 127.0.0.1:9092
brokers: kafka.designhunk.com:9092
spring:
  application:
    name: designhunk
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  #    io.opentelemetry.instrumentation.spring.autoconfigure.OpenTelemetryAutoConfiguration
  profiles:
    active: dev
  security:
    jwt:
      secret: "${vault:designhunk#jwt_secret}"
    oauth2:
      client:
        registration:
          google:
            clientId: "${vault:designhunk#google_clientid}"
            clientSecret: "${vault:designhunk#google_secret}"
            redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - email
              - profile
          facebook:
            clientId: "${vault:designhunk#facebook_clientid}"
            clientSecret: "${vault:designhunk#facebook_secret}"
            redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - email
              - public_profile
          github:
            clientId: "${vault:designhunk#github_clientid}"
            clientSecret: "${vault:designhunk#github_secret}"
            redirectUri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - user:email
              - read:user
        provider:
          facebook:
            authorizationUri: https://www.facebook.com/v3.0/dialog/oauth
            tokenUri: https://graph.facebook.com/v3.0/oauth/access_token
            userInfoUri: https://graph.facebook.com/v3.0/me?fields=id,first_name,middle_name,last_name,name,email,verified,is_verified,picture.width(250).height(250)

  data:
    redis:
      host: localhost
      port: 6379
      password: "${vault:designhunk#redispassword}"
  datasource:
    url: jdbc:mysql://46.225.98.200:3306/appdb
    username: "${vault:designhunk#dbusername}"
    password: "${vault:designhunk#dbpassword}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  second-datasource:
    url: jdbc:mysql://46.225.98.200:3306/appdb
    username: "${vault:designhunk#dbusername}"
    password: "${vault:designhunk#dbpassword}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
