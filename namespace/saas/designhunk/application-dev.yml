      springframework:
        security: DEBUG

support:
  email: atulrathodc@gmail.com
  name: Atul Rathod

stripe:
  secret:
    key: "${vault:designhunk#strip_key}"

my:
  framework:
    enabled: true
    apiKey: "${vault:designhunk#myframeworkkey}"

management:
  endpoints:
    web:
      base-path: /api/events/designhunk/actuator
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

  observations:
    key-values:
      application: designhunk

  tracing:
    sampling:
      probability: 0.0

  zipkin:
    tracing:
      propagation:
        type: none
      enabled: false
      endpoint: ""


resilience4j:
  circuitbreaker:
    instances:
      myService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 50s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      myService:
        maxAttempts: 3
        waitDuration: 2s
eureka:
  client:
    service-url:
      defaultZone: https://service-registry.designhunk.com/eureka/
#      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
  ssl:
    enabled: false
app:
  auth:
    tokenSecret: "${vault:designhunk#app_auth_tokenSecret}"
    tokenExpirationMsec: 864000000
  cors:
    allowedOrigins: http://localhost:3000,http://localhost:8080
  oauth2:
    # After successfully authenticating with the OAuth2 Provider,
    # we'll be generating an auth token for the user and sending the token to the
    # redirectUri mentioned by the client in the /oauth2/authorize request.
    # We're not using cookies because they won't work well in mobile clients.
    authorizedRedirectUris:
      - http://localhost:3000/oauth2/redirect
      - myandroidapp://oauth2/redirect
      - myiosapp://oauth2/redirect


